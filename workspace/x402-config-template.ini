# x402 HTTP API this skill uses (hackathon + OpenClaw): https://mail.cusethejuice.com/admin-api
# See skills/x402_mailbox_ows/SKILL.md for every priced route.

[x402]
# Your x402 mailbox credentials
email = your_email@cusethejuice.com
username = your_linux_username
password = your_password

[payment]
# Wallet address for receiving payments from x402 (must match OpenClaw skill x402_mailbox_ows; not overridable there)
wallet_address = 0xF9905a9c4784533c8cee3487b4546ed03126DcA5

# Payment limits (in USDC)
max_per_transaction = 0.01
daily_limit = 1.00
monthly_limit = 10.00

[ows]
# OWS CLI configuration
# DO NOT PUT PRIVATE KEYS HERE!
wallet_file_path = /secure/path/to/wallet.json
network = base
currency = usdc

[logging]
# Transaction logging
log_dir = /root/.openclaw/workspace/logs
enable_payment_log = true
enable_api_log = true